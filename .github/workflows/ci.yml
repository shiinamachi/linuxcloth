name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    steps:
      - name: Check out source and catalog
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.302'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install package validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes appstream desktop-file-utils shellcheck

      - name: Validate packaging scripts
        run: shellcheck eng/*.sh

      - name: Restore locked dependencies
        run: dotnet restore linuxcloth.slnx --locked-mode

      - name: Set reproducible source timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Select package version
        run: |
          if [[ "$GITHUB_REF_TYPE" == tag && "$GITHUB_REF_NAME" == v* ]]; then
            package_version=${GITHUB_REF_NAME#v}
          else
            package_version=0.0.0-ci.${GITHUB_RUN_NUMBER}
          fi
          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"

      - name: Verify formatting
        run: dotnet format linuxcloth.slnx --verify-no-changes --no-restore

      - name: Run tests
        run: dotnet test linuxcloth.slnx --configuration Release --no-restore

      - name: Publish deterministic package trees
        run: |
          eng/publish-linux.sh --output artifacts/stage-a --version "$PACKAGE_VERSION"
          grep -Fqx '  "sourceTreeDirty": false,' artifacts/stage-a/usr/share/linuxcloth/build-info.json
          grep -Fqx "  \"sourceRevision\": \"$GITHUB_SHA\"," artifacts/stage-a/usr/share/linuxcloth/build-info.json
          eng/publish-linux.sh --output artifacts/stage-b --version "$PACKAGE_VERSION" --skip-lock-verification
          eng/validate-package-tree.sh --root artifacts/stage-a --compare artifacts/stage-b --strict-tools

      - name: Build reproducible DEB and RPM packages
        run: |
          eng/package-in-containers.sh --stage artifacts/stage-a --output artifacts/packages-a
          eng/package-in-containers.sh --stage artifacts/stage-b --output artifacts/packages-b
          for package in artifacts/packages-a/linuxcloth*; do
            cmp "$package" "artifacts/packages-b/$(basename "$package")"
          done
          mkdir -p artifacts/packages
          cp artifacts/packages-a/linuxcloth* artifacts/packages/

      - name: Install and smoke-test target packages
        run: eng/test-packages-in-containers.sh --packages artifacts/packages

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: artifacts/stage-a
          format: spdx-json
          output-file: artifacts/packages/linuxcloth.spdx.json
          syft-version: v1.46.0
          upload-artifact: false
          upload-release-assets: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: artifacts/stage-a
          format: cyclonedx-json
          output-file: artifacts/packages/linuxcloth.cdx.json
          syft-version: v1.46.0
          upload-artifact: false
          upload-release-assets: false

      - name: Write artifact checksums
        run: (cd artifacts/packages && sha256sum linuxcloth* > SHA256SUMS)

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linuxcloth-linux-x64
          path: artifacts/packages/
          if-no-files-found: error
          compression-level: 0

  attest-packages:
    if: github.event_name != 'pull_request'
    needs: test-and-package
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download verified build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linuxcloth-linux-x64
          path: artifacts/packages

      - name: Verify downloaded checksums
        run: (cd artifacts/packages && sha256sum --check --strict SHA256SUMS)

      - name: Attest package build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: artifacts/packages/*

      - name: Attest package SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            artifacts/packages/*.deb
            artifacts/packages/*.rpm
          sbom-path: artifacts/packages/linuxcloth.spdx.json
